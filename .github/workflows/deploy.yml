name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build (Standalone App)
        run: |
          npm install
          npm run build
          # The standalone app (with Viewer/Editor tabs) is built to dist/

      - name: Build Combined Card + Editor
        run: |
          npm run build:combined
          # Copy the combined JS into dist/demo/ so the demo page uses it too
          mkdir -p dist/demo
          cp release/ha-floorplan-card.js dist/demo/
          # Also copy the demo HTML if it exists in docs/demo/
          if [ -f docs/demo/index.html ]; then
            cp docs/demo/index.html dist/demo/
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

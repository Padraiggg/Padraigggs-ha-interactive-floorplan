<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HA Interactive Floorplan — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: #f9fafb; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

    header { padding: 16px 24px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    header h1 { font-size: 1.25rem; font-weight: 700; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    header p { font-size: 0.85rem; color: #94a3b8; }
    .badge { background: #1e293b; border: 1px solid #334155; border-radius: 999px; padding: 4px 14px; font-size: 0.75rem; color: #d1d5db; text-decoration: none; transition: all 0.2s; }
    .badge:hover { background: #334155; border-color: #60a5fa; }

    .main-layout { display: flex; gap: 0; min-height: calc(100vh - 120px); }
    .card-container { flex: 1; padding: 16px; display: flex; justify-content: center; align-items: flex-start; }
    ha-floorplan-card { display: block; width: 100%; max-width: 1200px; border-radius: 12px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }

    .sidebar { width: 280px; background: #1e293b; border-left: 1px solid #334155; padding: 16px; overflow-y: auto; max-height: calc(100vh - 120px); }
    .sidebar h2 { font-size: 0.9rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .entity-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .entity-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; background: #0f172a; border: 1px solid #1e293b; }
    .entity-item:hover { background: #334155; border-color: #475569; }
    .entity-item.on { background: rgba(250, 204, 21, 0.1); border-color: rgba(250, 204, 21, 0.3); }
    .entity-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all 0.3s; }
    .entity-icon.off { background: #334155; }
    .entity-icon.on { background: rgba(250, 204, 21, 0.2); box-shadow: 0 0 12px rgba(250, 204, 21, 0.3); }
    .entity-info { flex: 1; min-width: 0; }
    .entity-name { font-size: 0.82rem; font-weight: 500; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entity-state { font-size: 0.7rem; color: #64748b; transition: color 0.3s; }
    .entity-state.on { color: #facc15; }
    .entity-toggle { width: 36px; height: 20px; border-radius: 10px; background: #475569; position: relative; transition: background 0.3s; cursor: pointer; flex-shrink: 0; }
    .entity-toggle.on { background: #facc15; }
    .entity-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: white; transition: transform 0.3s; }
    .entity-toggle.on::after { transform: translateX(16px); }

    .stats-bar { display: flex; gap: 12px; padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; }
    .stat { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #94a3b8; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
    .stat-dot.on { background: #facc15; box-shadow: 0 0 6px #facc15; }
    .stat-dot.off { background: #475569; }
    .stat-count { font-weight: 700; color: #e2e8f0; }

    .controls-bar { display: flex; gap: 8px; padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; }
    .ctrl-btn { padding: 6px 16px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
    .ctrl-btn:hover { background: #334155; border-color: #60a5fa; }
    .ctrl-btn.active { background: #1d4ed8; border-color: #3b82f6; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px 24px; font-size: 0.85rem; color: #f9fafb; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 9999; box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 8px; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-icon { font-size: 1.1rem; }

    footer { text-align: center; padding: 20px; color: #475569; font-size: 0.75rem; border-top: 1px solid #1e293b; }
    footer a { color: #60a5fa; text-decoration: none; }

    @media (max-width: 900px) {
      .main-layout { flex-direction: column; }
      .sidebar { width: 100%; max-height: none; border-left: none; border-top: 1px solid #334155; }
    }

    @keyframes pulse-on { 0% { box-shadow: 0 0 0 0 rgba(250,204,21,0.4); } 70% { box-shadow: 0 0 0 10px rgba(250,204,21,0); } 100% { box-shadow: 0 0 0 0 rgba(250,204,21,0); } }
    .entity-item.just-toggled { animation: pulse-on 0.6s ease-out; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>&#127968; HA Interactive Floorplan &mdash; Demo</h1>
    <p>Click on lights and devices to toggle them on/off. Fully interactive simulation without Home Assistant.</p>
  </div>
  <a class="badge" href="https://github.com/Padraiggg/Padraigggs-ha-interactive-floorplan" target="_blank">&#11088; GitHub</a>
  <a class="badge" href="https://github.com/Padraiggg/Padraigggs-ha-interactive-floorplan/releases" target="_blank">&#8681; Download</a>
</header>

<div class="controls-bar">
  <button class="ctrl-btn" id="btn-all-on" onclick="setAll('on')">&#128161; All on</button>
  <button class="ctrl-btn" id="btn-all-off" onclick="setAll('off')">&#127769; All off</button>
  <button class="ctrl-btn" id="btn-scene-cozy" onclick="applyScene('cozy')">&#127867; Cozy</button>
  <button class="ctrl-btn" id="btn-scene-bright" onclick="applyScene('bright')">&#9728;&#65039; Bright</button>
  <button class="ctrl-btn" id="btn-scene-movie" onclick="applyScene('movie')">&#127916; Movie</button>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat"><span class="stat-dot on"></span> On: <span class="stat-count" id="stat-on">0</span></div>
  <div class="stat"><span class="stat-dot off"></span> Off: <span class="stat-count" id="stat-off">0</span></div>
</div>

<div class="main-layout">
  <div class="card-container">
    <ha-floorplan-card id="floorplan"></ha-floorplan-card>
  </div>
  <div class="sidebar">
    <h2>&#128218; Devices</h2>
    <ul class="entity-list" id="entity-list"></ul>
  </div>
</div>

<div class="toast" id="toast"><span class="toast-icon"></span><span class="toast-msg"></span></div>

<footer>

</footer>

  { entityId: 'light.spot_2_achter',            label: 'Spot 2 back', type: 'light',   icon: '\u{1F4A1}', onColor: [255,245,204], brightness: 200 },
  { entityId: 'light.spot_rgb_achter',          label: 'RGB spot back', type: 'light', icon: '\u{1F308}', onColor: [0,179,21],    brightness: 180 },

];

/* ── Scenes ──────────────────────────────────────────── */
var SCENES = {
  cozy: {
    'light.eettafel': 'on', 'light.bk3': 'on',
    'light.hoekjeslamp_2': 'on', 'light.takjeslicht': 'on',
    'light.lichtvissen': 'on', 'entity.3723': 'off',
    'light.spot2voor': 'off', 'light.spotrgbvoor': 'off',
    'light.spot1voor': 'off', 'light.spot4voor': 'off',
    'light.tv': 'off',
    'light.spot_1_achter': 'off', 'light.spot_2_achter': 'off',
    'light.spot_rgb_achter': 'off', 'entity.f92f': 'off'
  },
  bright: function() {
    var s = {};
    ENTITIES.forEach(function(e) { s[e.entityId] = 'on'; });
    return s;
  },
  movie: {
    'light.tv': 'on', 'light.lichtvissen': 'on',
    'light.eettafel': 'off', 'light.bk3': 'off',
    'entity.3723': 'off', 'light.spot2voor': 'off',
    'light.spotrgbvoor': 'off', 'light.spot1voor': 'off',
    'light.spot4voor': 'off', 'light.hoekjeslamp_2': 'off',
    'light.takjeslicht': 'off', 'light.spot_1_achter': 'off',
    'light.spot_2_achter': 'off', 'light.spot_rgb_achter': 'off',
    'entity.f92f': 'off'
  }
};

/* ── Mock state (all start OFF) ───────────────────── */
var mockStates = {};
ENTITIES.forEach(function(e) {
  mockStates[e.entityId] = { state: 'off', attributes: { rgb_color: e.onColor, brightness: e.brightness } };
});

/* ── Toast ────────────────────────────────────────────── */
function showToast(icon, msg) {
  var t = document.getElementById('toast');
  t.querySelector('.toast-icon').textContent = icon;
  t.querySelector('.toast-msg').textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

/* ── Stats ────────────────────────────────────────────── */
function updateStats() {
  var on = 0, off = 0;
  ENTITIES.forEach(function(e) {
    if (mockStates[e.entityId].state === 'on') on++; else off++;
  });
  document.getElementById('stat-on').textContent = on;
  document.getElementById('stat-off').textContent = off;
}

/* ── Sidebar entity list ─────────────────────────────── */
function buildSidebar() {
  var ul = document.getElementById('entity-list');
  ul.innerHTML = '';
  ENTITIES.forEach(function(e) {
    var isOn = mockStates[e.entityId].state === 'on';
    var li = document.createElement('li');
    li.className = 'entity-item' + (isOn ? ' on' : '');
    li.dataset.entityId = e.entityId;
    li.innerHTML =
      '<div class="entity-icon ' + (isOn ? 'on' : 'off') + '">' + e.icon + '</div>' +
      '<div class="entity-info"><div class="entity-name">' + e.label + '</div>' +
      '<div class="entity-state ' + (isOn ? 'on' : '') + '">' + (isOn ? 'On' : 'Off') + '</div></div>' +
      '<div class="entity-toggle ' + (isOn ? 'on' : '') + '"></div>';
    li.onclick = function() { toggleEntity(e.entityId); };
    ul.appendChild(li);
  });
}

/* ── Toggle entity ───────────────────────────────────── */
function toggleEntity(entityId) {
  var cur = mockStates[entityId].state;
  var next = (cur === 'on') ? 'off' : 'on';
  mockStates[entityId] = Object.assign({}, mockStates[entityId], { state: next });

  var ent = ENTITIES.find(function(e) { return e.entityId === entityId; });
  var icon = next === 'on' ? '\u{1F7E2}' : '\u{1F534}';
  showToast(icon, ent.label + ' ' + (next === 'on' ? 'turned on' : 'turned off'));

  // Pulse animation on sidebar item
  var items = document.querySelectorAll('.entity-item');
  items.forEach(function(item) {
    if (item.dataset.entityId === entityId) {
      item.classList.add('just-toggled');
      setTimeout(function() { item.classList.remove('just-toggled'); }, 600);
    }
  });

  updateCard();
  buildSidebar();
  updateStats();
}

/* ── Set all on/off ──────────────────────────────────── */
function setAll(state) {
  ENTITIES.forEach(function(e) {
    mockStates[e.entityId] = Object.assign({}, mockStates[e.entityId], { state: state });
  });
  showToast(state === 'on' ? '\u{2600}\u{FE0F}' : '\u{1F319}', 'All devices ' + (state === 'on' ? 'turned on' : 'turned off'));
  updateCard();
  buildSidebar();
  updateStats();
}

/* ── Apply scene ─────────────────────────────────────── */
function applyScene(name) {
  var scene = SCENES[name];
  if (typeof scene === 'function') scene = scene();
  Object.keys(scene).forEach(function(eid) {
    if (mockStates[eid]) {
      mockStates[eid] = Object.assign({}, mockStates[eid], { state: scene[eid] });
    }
  });
  var icons = { cozy: '\u{1F367}', bright: '\u{2600}\u{FE0F}', movie: '\u{1F3AC}' };
  var labels = { cozy: 'Cozy', bright: 'Bright', movie: 'Movie' };
  showToast(icons[name] || '\u{1F3AD}', 'Scene: ' + (labels[name] || name));
  updateCard();
  buildSidebar();
  updateStats();
}

/* ── Build hass object ───────────────────────────────── */
var hassVersion = 0;
function buildHass() {
  var computedStates = {};
  Object.keys(mockStates).forEach(function(eid) {
    var s = mockStates[eid];
    var on = (s.state === 'on' || s.state === 'idle');
    computedStates[eid] = Object.assign({}, s, { shouldLightUp: on });
  });
  hassVersion++;
  return {
    states: computedStates,
    _v: hassVersion,
    callService: function(domain, service, data, target) {
      var eid = (target && target.entity_id) || (data && data.entity_id);
      if (!eid || !mockStates[eid]) return;
      var cur = mockStates[eid].state;
      var next;
      if (service === 'toggle') next = (cur === 'on' || cur === 'idle') ? 'off' : 'on';
      else if (service === 'turn_on')  next = 'on';
      else if (service === 'turn_off') next = 'off';
      else next = cur;
      mockStates[eid] = Object.assign({}, mockStates[eid], { state: next });

      var ent = ENTITIES.find(function(e) { return e.entityId === eid; });
      if (ent) {
        var icon = next === 'on' ? '\u{1F7E2}' : '\u{1F534}';
        showToast(icon, ent.label + ' ' + (next === 'on' ? 'turned on' : 'turned off'));
      }

      updateCard();
      buildSidebar();
      updateStats();
    }
  };
}

/* ── Update card ─────────────────────────────────────── */
function updateCard() {
  card.hass = buildHass();
}

/* ── Card initialization ─────────────────────────────── */
var card = document.getElementById('floorplan');

function initCard() {
  card.config = FLOORPLAN_CONFIG;
  if (typeof card.setConfig === 'function') {
    card.setConfig(FLOORPLAN_CONFIG);
  }
  setTimeout(function() {
    card.hass = buildHass();
    buildSidebar();
    updateStats();
  }, 50);
  card.addEventListener('hass-more-info', function(e) {
    var eid = (e.detail && e.detail.entityId) ? e.detail.entityId : '';
    var ent = ENTITIES.find(function(en) { return en.entityId === eid; });
    showToast('\u{2139}\u{FE0F}', 'Info: ' + (ent ? ent.label : eid.split('.')[1]));
  });
}

if (customElements.get('ha-floorplan-card')) {
  initCard();
} else {
  customElements.whenDefined('ha-floorplan-card').then(function() {
    setTimeout(initCard, 100);
  });
}
